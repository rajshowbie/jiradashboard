<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jira Flow Timeline Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-start: #0f172a;
    --bg-end: #1e293b;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.1);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.3);
  }

  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%); background-attachment: fixed; color: var(--text-primary); min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  .app { display: flex; flex-direction: column; min-height: 100vh; }
  header { position: sticky; top: 0; z-index: 100; background: rgba(15,23,42,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
  .logo-icon { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .header-actions { display: flex; align-items: center; gap: 10px; }

  main { flex: 1; padding: 24px; max-width: 1600px; margin: 0 auto; width: 100%; }

  .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; backdrop-filter: blur(12px); padding: 20px; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; box-shadow: 0 0 20px var(--accent-glow); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 24px var(--accent-glow); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-secondary); }
  .btn-ghost:hover { background: rgba(255,255,255,0.09); }

  .loading { text-align: center; padding: 60px 20px; }
  .spinner { width: 44px; height: 44px; border: 3px solid rgba(99,102,241,0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 16px; border-radius: 10px; margin-bottom: 20px; }

  .modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: linear-gradient(160deg, rgba(30,41,59,0.98), rgba(15,23,42,0.98)); border: 1px solid var(--glass-border); border-radius: 20px; padding: 28px; width: 100%; max-width: 500px; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
  .modal-header { margin-bottom: 22px; }
  .modal-title { font-size: 17px; font-weight: 700; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  .form-input { width: 100%; padding: 10px 14px; border-radius: 10px; font-size: 13.5px; background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: var(--text-primary); outline: none; }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .metric-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px 18px; }
  .metric-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .metric-value { font-size: 28px; font-weight: 700; line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .anomaly-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .anomaly-item { display: flex; gap: 10px; background: var(--glass); border: 1px solid; border-radius: 10px; padding: 10px 14px; font-size: 12.5px; }
  .anomaly-item.danger { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.07); }
  .anomaly-icon { font-size: 14px; flex-shrink: 0; }
  .anomaly-text { color: var(--text-secondary); line-height: 1.4; }
  .anomaly-text strong { color: var(--text-primary); }

  .section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .section-title .count { font-size: 11px; padding: 2px 7px; border-radius: 5px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-muted); }

  .timeline-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .timeline-table th { padding: 8px 12px; text-align: left; color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
  .timeline-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .timeline-table tr:hover td { background: rgba(255,255,255,0.02); }

  .issue-key { font-family: 'SF Mono', monospace; font-size: 11.5px; color: #818cf8; font-weight: 600; }
  .issue-summary { color: var(--text-secondary); max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .priority-badge { display: inline-flex; padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
  .priority-highest { background: rgba(239,68,68,0.2); color: #ef4444; }
  .priority-high { background: rgba(245,158,11,0.2); color: #f59e0b; }
  .priority-medium { background: rgba(99,102,241,0.2); color: #818cf8; }

  .bar-track { position: relative; height: 22px; min-width: 240px; }
  .bar-segment { position: absolute; top: 2px; height: 18px; border-radius: 4px; font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.85); overflow: hidden; min-width: 4px; display: flex; align-items: center; }
  .bar-segment .seg-label { padding: 0 4px; overflow: hidden; text-overflow: ellipsis; }

  .state-chip { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 10.5px; font-weight: 600; }

  .flag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 4px; }
  .flag-stuck { background: rgba(245,158,11,0.2); color: #f59e0b; }
  .flag-rework { background: rgba(239,68,68,0.2); color: #ef4444; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  .divider { height: 1px; background: var(--glass-border); margin: 20px 0; }
  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span>Flow Timeline</span>
    </div>
    <div class="header-actions">
      <div id="epicBadge" style="font-size:12px;color:var(--text-muted);font-family:'SF Mono',monospace;"></div>
      <button class="btn btn-ghost btn-sm" onclick="openSettings()">⚙ Configure</button>
    </div>
  </header>

  <main id="main">
    <div class="modal-overlay" id="settingsModal">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">⚙ Jira Configuration</div>
        </div>
        <div id="settingsError" style="display:none" class="error"></div>
        <div class="form-group">
          <label class="form-label">Jira Base URL</label>
          <input class="form-input" id="jiraUrl" type="url" placeholder="https://showbie.atlassian.net" autocomplete="off">
          <div class="form-hint">Your Atlassian cloud URL (no trailing slash)</div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="jiraEmail" type="email" placeholder="you@company.com" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">API Token</label>
          <input class="form-input" id="jiraToken" type="password" placeholder="••••••••••••••••••••" autocomplete="off">
          <div class="form-hint">Generate at: id.atlassian.com → Security → API tokens (with read:jira-work scope)</div>
        </div>
        <div class="form-group">
          <label class="form-label">Epic Issue Key</label>
          <input class="form-input" id="jiraEpic" type="text" placeholder="CT-127" autocomplete="off" style="text-transform:uppercase">
          <div class="form-hint">The epic whose child issues will be visualized</div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Stuck Threshold (days)</label>
            <input class="form-input" id="stuckDays" type="number" min="1" value="5">
          </div>
          <div class="form-group">
            <label class="form-label">Rework Bounce Count</label>
            <input class="form-input" id="reworkCount" type="number" min="1" value="2">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Critical Delay (days)</label>
          <input class="form-input" id="criticalDays" type="number" min="1" value="3">
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="fetchBtn" onclick="fetchData()">Fetch Data ↗</button>
        </div>
      </div>
    </div>

    <div id="dashboard" style="display:none">
      <div class="metrics-grid" id="metricsGrid"></div>
      <div id="anomalySection" style="display:none">
        <div class="section-title">⚠ Anomalies <span class="count" id="anomalyCount">0</span></div>
        <div class="anomaly-list" id="anomalyList"></div>
        <div class="divider"></div>
      </div>
      <div class="legend" id="stateLegend"></div>
      <div id="scaleInfo" style="font-size:11px;color:var(--text-muted);margin-bottom:8px;"></div>
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="overflow-x:auto;">
          <table class="timeline-table" id="timelineTable">
            <thead>
              <tr>
                <th style="min-width:90px">Key</th>
                <th style="min-width:220px">Summary</th>
                <th style="min-width:80px">Priority</th>
                <th style="min-width:90px">Current State</th>
                <th style="min-width:80px">Cycle Time</th>
                <th style="min-width:260px">Flow Timeline</th>
                <th style="min-width:120px">Flags</th>
              </tr>
            </thead>
            <tbody id="timelineBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
let data = null;

function openSettings() {
  document.getElementById('settingsModal').style.display = 'flex';
  loadSavedSettings();
}

function closeSettings() {
  document.getElementById('settingsModal').style.display = 'none';
}

function saveSettings() {
  const settings = {
    jiraUrl: document.getElementById('jiraUrl').value,
    jiraEmail: document.getElementById('jiraEmail').value,
    jiraToken: document.getElementById('jiraToken').value,
    jiraEpic: document.getElementById('jiraEpic').value,
    stuckDays: document.getElementById('stuckDays').value,
    reworkCount: document.getElementById('reworkCount').value,
    criticalDays: document.getElementById('criticalDays').value,
  };
  localStorage.setItem('jiraSettings', JSON.stringify(settings));
}

function loadSavedSettings() {
  const saved = localStorage.getItem('jiraSettings');
  if (saved) {
    const settings = JSON.parse(saved);
    document.getElementById('jiraUrl').value = settings.jiraUrl || '';
    document.getElementById('jiraEmail').value = settings.jiraEmail || '';
    document.getElementById('jiraToken').value = settings.jiraToken || '';
    document.getElementById('jiraEpic').value = settings.jiraEpic || '';
    document.getElementById('stuckDays').value = settings.stuckDays || '5';
    document.getElementById('reworkCount').value = settings.reworkCount || '2';
    document.getElementById('criticalDays').value = settings.criticalDays || '3';
  }
}

async function fetchData() {
  const jiraUrl = document.getElementById('jiraUrl').value.trim().replace(/\/+$/, '');
  const jiraEmail = document.getElementById('jiraEmail').value.trim();
  const jiraToken = document.getElementById('jiraToken').value.trim();
  const jiraEpic = document.getElementById('jiraEpic').value.trim().toUpperCase();
  const stuckDays = document.getElementById('stuckDays').value;
  const reworkCount = document.getElementById('reworkCount').value;
  const criticalDays = document.getElementById('criticalDays').value;

  if (!jiraUrl || !jiraEmail || !jiraToken || !jiraEpic) {
    showError('Please fill in all fields');
    return;
  }

  saveSettings();
  document.getElementById('fetchBtn').disabled = true;
  document.getElementById('settingsError').style.display = 'none';

  try {
    const resp = await fetch('/api/fetch-data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jiraUrl, jiraEmail, jiraToken, jiraEpic,
        stuckDays, reworkCount, criticalDays,
      }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error);
    }

    data = await resp.json();
    closeSettings();
    renderDashboard();
  } catch (err) {
    showError(err.message);
  } finally {
    document.getElementById('fetchBtn').disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('settingsError');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}

function renderDashboard() {
  document.getElementById('main').innerHTML = document.getElementById('dashboard').parentElement.innerHTML;
  document.getElementById('dashboard').style.display = 'block';

  const cfg = data.config;
  const issues = data.issues;

  document.getElementById('epicBadge').textContent = data.epic;

  // Metrics
  const total = issues.length;
  const closed = issues.filter(i => i.status.toLowerCase().includes('done') || i.status.toLowerCase().includes('closed')).length;
  const stuck = issues.filter(i => i.isStuck).length;
  const cycleTimes = issues.map(i => i.cycleTime).filter(v => v !== null && v > 0);
  const avgCycle = cycleTimes.length ? cycleTimes.reduce((a,b) => a+b, 0) / cycleTimes.length : null;
  const reworkRate = total > 0 ? Math.round((issues.filter(i => i.reworkCount > 0).length / total) * 100) : 0;

  document.getElementById('metricsGrid').innerHTML = [
    metric('Total Issues', total, '', 'info'),
    metric('Closed', closed, `${Math.round(closed/Math.max(total,1)*100)}%`, closed === total ? 'good' : ''),
    metric('Avg Cycle Time', avgCycle !== null ? Math.round(avgCycle) + 'd' : '—', 'working days', ''),
    metric('Rework Rate', reworkRate + '%', '', ''),
    metric('Stuck Issues', stuck, `>${cfg.STUCK_DAYS}d`, stuck > 0 ? 'danger' : ''),
  ].join('');

  // Anomalies
  const anomalies = [];
  issues.forEach(issue => {
    if (issue.isStuck) anomalies.push({ icon: '⏱', text: `<strong>${issue.key}</strong> stuck in <em>${issue.status}</em> for ${issue.daysInCurrent} days` });
    if (issue.reworkCount > cfg.REWORK_COUNT) anomalies.push({ icon: '🔄', text: `<strong>${issue.key}</strong> rework bounces: ${issue.reworkCount}×` });
    if (issue.hasRegression) anomalies.push({ icon: '⬇', text: `<strong>${issue.key}</strong> regressed to earlier state` });
    if (issue.isCriticalDelayed) anomalies.push({ icon: '🚨', text: `<strong>${issue.key}</strong> (${issue.priority}) cycle time ${Math.round(issue.cycleTime)}d exceeds ${cfg.CRITICAL_DAYS}d` });
  });

  const section = document.getElementById('anomalySection');
  if (anomalies.length === 0) { section.style.display = 'none'; } else {
    section.style.display = 'block';
    document.getElementById('anomalyCount').textContent = anomalies.length;
    document.getElementById('anomalyList').innerHTML = anomalies.map(a =>
      `<div class="anomaly-item danger"><span class="anomaly-icon">${a.icon}</span><span class="anomaly-text">${a.text}</span></div>`
    ).join('');
  }

  // Timeline
  const allDates = issues.flatMap(i => i.transitions.flatMap(t => [new Date(t.start).getTime(), new Date(t.end).getTime()]));
  const minDate = allDates.length ? Math.min(...allDates) : Date.now() - 30*86400000;
  const maxDate = allDates.length ? Math.max(...allDates) : Date.now();
  const span = maxDate - minDate || 1;
  const totalDays = Math.ceil(span / 86400000);
  document.getElementById('scaleInfo').textContent = `Timeline spans ${totalDays} days`;

  const seenStates = new Set(issues.flatMap(i => i.transitions.map(t => t.state)));
  document.getElementById('stateLegend').innerHTML = Array.from(seenStates).map(s =>
    `<div class="legend-item"><div class="legend-dot" style="background:${stateColor(s)}"></div>${s}</div>`
  ).join('');

  document.getElementById('timelineBody').innerHTML = issues.map(issue => {
    const flags = [];
    if (issue.isStuck) flags.push(`<span class="flag flag-stuck">⏱ Stuck</span>`);
    if (issue.reworkCount > cfg.REWORK_COUNT) flags.push(`<span class="flag flag-rework">↩ Rework×${issue.reworkCount}</span>`);

    const barSegments = issue.transitions.map(t => {
      const left = ((new Date(t.start).getTime() - minDate) / span) * 100;
      const width = Math.max(0.3, ((new Date(t.end).getTime() - new Date(t.start).getTime()) / span) * 100);
      const days = Math.round(t.days * 10) / 10;
      return `<div class="bar-segment" style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%;background:${stateColor(t.state)}" title="${t.state}: ${days}d">
        <span class="seg-label">${width > 4 ? t.state : ''}</span>
      </div>`;
    }).join('');

    return `<tr>
      <td class="issue-key">${issue.key}</td>
      <td class="issue-summary" title="${issue.summary}">${issue.summary}</td>
      <td><span class="priority-badge priority-${issue.priority.toLowerCase().replace(/\s+/g,'-')}">${issue.priority}</span></td>
      <td><span class="state-chip" style="background:${stateColor(issue.status)}22;color:${stateColor(issue.status)}">${issue.status}</span></td>
      <td>${issue.cycleTime !== null ? Math.round(issue.cycleTime) + 'd' : '—'}</td>
      <td><div class="bar-track">${barSegments}</div></td>
      <td>${flags.join('') || '—'}</td>
    </tr>`;
  }).join('');
}

function metric(label, value, sub, cls) {
  return `<div class="metric-card"><div class="metric-label">${label}</div><div class="metric-value">${value}</div>${sub ? `<div class="metric-sub">${sub}</div>` : ''}</div>`;
}

function stateColor(name) {
  const colors = {
    'open': '#3b82f6', 'to do': '#3b82f6',
    'in progress': '#f59e0b', 'in development': '#f59e0b',
    'review': '#a855f7',
    'rework': '#ef4444',
    'qa': '#06b6d4', 'testing': '#06b6d4',
    'ready': '#10b981',
    'demo': '#6366f1',
    'done': '#475569', 'closed': '#475569', 'resolved': '#475569',
  };
  return colors[name?.toLowerCase()] || '#64748b';
}

document.addEventListener('DOMContentLoaded', openSettings);
</script>
</body>
</html>
